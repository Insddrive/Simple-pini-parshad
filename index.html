<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ਕੈਲਕੂਲੇਟਰ</title>
    <style>
        /* ਬਿਲਕੁਲ ਹਲਕਾ ਅਤੇ ਕਲੀਨ ਡਿਜ਼ਾਈਨ */
        body {
            font-family: system-ui, sans-serif;
            margin: 0;
            background-color: #000000;
            color: #d1d5db;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            min-height: 100vh;
            padding: 8px;
            box-sizing: border-box;
            touch-action: manipulation;
            user-select: none;
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        /* ਸਿੰਪਲ ਟੈਬ ਬਟਨ */
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 12px;
            border-bottom: 1px solid #222;
            padding-bottom: 8px;
        }
        .tab-btn {
            flex: 1;
            padding: 6px 2px;
            text-align: center;
            color: #6b7280;
            background: transparent;
            border: none;
            font-weight: bold;
            font-size: 0.95rem;
            cursor: pointer;
            transition: color 0.2s;
        }
        .tab-btn.active {
            color: #3b82f6;
            border-bottom: 2px solid #3b82f6;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* ਆਹਮੋ-ਸਾਹਮਣੇ (Side-by-Side) ਲੇਆਉਟ */
        .grid-2col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 16px;
        }

        /* ਬਿਨਾਂ ਹੈਵੀ ਬਾਰਡਰ ਵਾਲੇ ਸਿੰਪਲ ਬਾਕਸ */
        .box {
            background-color: transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 4px;
        }

        .box-label {
            font-size: 0.85rem;
            color: #9ca3af;
            margin-bottom: 6px;
        }

        /* ਡਿਟੇਲ ਦਿਖਾਉਣ ਲਈ ਛੋਟਾ ਟੈਕਸਟ */
        .sub-detail {
            font-size: 0.85rem;
            color: #60a5fa;
            margin-top: 4px;
        }

        .box-value {
            font-size: 1.25rem;
            font-weight: bold;
        }

        /* ਸਿੰਪਲ ਇਨਪੁਟ - ਸਿਰਫ਼ ਹੇਠਾਂ ਲਾਈਨ */
        .calc-input {
            width: 80%;
            padding: 4px;
            text-align: center;
            font-size: 1.25rem;
            font-weight: bold;
            color: #ffffff;
            background: transparent;
            border: none;
            border-bottom: 1px solid #4b5563;
            border-radius: 0;
            outline: none;
        }
        .calc-input:focus {
            border-bottom-color: #3b82f6;
            color: #3b82f6;
        }

        /* ਰੰਗ */
        .text-green { color: #10b981; }
        .text-red { color: #ef4444; }
        .text-white { color: #ffffff; }

        /* ਬਿਲਕੁਲ ਹਲਕਾ ਕੀਪੈਡ */
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
        }
        .key-btn {
            background: #111827;
            border: none;
            color: white;
            padding: 14px 0;
            font-size: 1.3rem;
            font-weight: normal;
            border-radius: 8px;
            cursor: pointer;
        }
        .key-btn:active { background: #374151; }
        .key-special { background: #1f2937; color: #9ca3af; }
        .col-span-3 { grid-column: span 3; }
    </style>
</head>
<body>

    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('tab1', this)">ਮੈਨੂਅਲ</button>
            <button class="tab-btn" onclick="switchTab('tab2', this)">ਆਟੋ ਪਿੰਨੀ</button>
            <button class="tab-btn" onclick="switchTab('tab3', this)">ਕਨਵਰਟਰ</button>
        </div>

        <div id="tab1" class="tab-content active">
            <div class="grid-2col">
                <div class="box">
                    <span class="box-label">ਸਿਰੋਪਾਓ (₹151)</span>
                    <input type="text" inputmode="none" id="inputB" value="0" class="calc-input" readonly>
                    <span class="sub-detail">ਰਕਮ: ₹<span id="sub_151">0</span></span>
                </div>
                <div class="box">
                    <span class="box-label">ਪਿੰਨੀ (₹20)</span>
                    <input type="text" inputmode="none" id="inputD" value="0" class="calc-input" readonly>
                    <span class="sub-detail">ਰਕਮ: ₹<span id="sub_20">0</span></span>
                </div>
            </div>
            
            <div class="grid-2col">
                <div class="box">
                    <span class="box-label text-white">ਕੁੱਲ ਬਣਦੀ ਰਕਮ</span>
                    <span class="box-value text-white">₹<span id="result1">0</span></span>
                </div>
                <div class="box">
                    <span class="box-label">ਪ੍ਰਾਪਤ ਨਕਦ</span>
                    <input type="text" inputmode="none" id="inputE" value="0" class="calc-input" readonly>
                </div>
            </div>

            <div id="final_result_wrapper" class="box" style="margin-bottom: 10px;">
                <span class="box-label">ਵਾਪਸੀ ਬਕਾਇਆ</span>
                <span id="balance_value_container" class="box-value text-white">₹<span id="result2">0</span></span>
            </div>
        </div>

        <div id="tab2" class="tab-content">
            <div class="grid-2col">
                <div class="box">
                    <span class="box-label">ਕੁੱਲ ਪ੍ਰਾਪਤ ਰਕਮ</span>
                    <input type="text" inputmode="none" id="inputTab2Total" value="0" class="calc-input" readonly>
                </div>
                <div class="box">
                    <span class="box-label">ਸਿਰੋਪਾਓ (₹151)</span>
                    <input type="text" inputmode="none" id="inputTab2_151" value="0" class="calc-input" readonly>
                </div>
                <div class="box">
                    <span class="box-label text-white">ਪਿੰਨੀ ਪੈਕਟ (₹20)</span>
                    <span class="box-value text-green" id="tab2_auto20_display">0 (₹0)</span>
                </div>
                <div class="box">
                    <span class="box-label">ਵਾਪਸੀ ਬਕਾਇਆ</span>
                    <span id="tab2_balance_container" class="box-value text-white">₹<span id="tab2_balance">0</span></span>
                </div>
            </div>
        </div>

        <div id="tab3" class="tab-content">
            <div class="grid-2col">
                <div class="box">
                    <span class="box-label">ਰਕਮ (₹)</span>
                    <input type="text" inputmode="none" id="inputTab3_Amount" value="0" class="calc-input" readonly>
                </div>
                <div class="box">
                    <span class="box-label">ਪੈਕਟ (ਗਿਣਤੀ)</span>
                    <input type="text" inputmode="none" id="inputTab3_Packets" value="0" class="calc-input" readonly>
                </div>
            </div>
        </div>

        <div class="keypad" id="keypad">
            <button class="key-btn">7</button>
            <button class="key-btn">8</button>
            <button class="key-btn">9</button>
            
            <button class="key-btn">4</button>
            <button class="key-btn">5</button>
            <button class="key-btn">6</button>
            
            <button class="key-btn">1</button>
            <button class="key-btn">2</button>
            <button class="key-btn">3</button>
            
            <button class="key-btn key-special">.</button>
            <button class="key-btn">0</button>
            <button class="key-btn key-special" id="backspace">⌫</button>
            
            <button class="key-btn key-special col-span-3" id="clear">ਕਲੀਅਰ</button>
        </div>
    </div>

    <script>
        let activeTab = 'tab1';
        let currentFocusedInput = null;

        function switchTab(tabId, btnElement) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            btnElement.classList.add('active');
            
            activeTab = tabId;
            
            if (activeTab === 'tab1') currentFocusedInput = document.getElementById('inputB');
            else if (activeTab === 'tab2') currentFocusedInput = document.getElementById('inputTab2Total');
            else if (activeTab === 'tab3') currentFocusedInput = document.getElementById('inputTab3_Amount');
            
            if(currentFocusedInput) currentFocusedInput.focus();
        }

        document.addEventListener('DOMContentLoaded', () => {
            const inputB = document.getElementById('inputB');
            const inputD = document.getElementById('inputD');
            const inputE = document.getElementById('inputE');
            
            const inputTab2Total = document.getElementById('inputTab2Total');
            const inputTab2_151 = document.getElementById('inputTab2_151');

            const inputTab3_Amount = document.getElementById('inputTab3_Amount');
            const inputTab3_Packets = document.getElementById('inputTab3_Packets');
            
            const editableInputs = [inputB, inputD, inputE, inputTab2Total, inputTab2_151, inputTab3_Amount, inputTab3_Packets];

            const sub_151 = document.getElementById('sub_151');
            const sub_20 = document.getElementById('sub_20');
            const result1 = document.getElementById('result1');
            const result2 = document.getElementById('result2');
            const balance_value_container = document.getElementById('balance_value_container');
            
            const tab2_balance = document.getElementById('tab2_balance');
            const tab2_balance_container = document.getElementById('tab2_balance_container');
            const tab2_auto20_display = document.getElementById('tab2_auto20_display');

            const keypad = document.getElementById('keypad');
            let isOverwriteHead = true;

            const priceSiropao = 151;
            const pricePinni = 20;

            function formatNumber(num) {
                if (Number.isInteger(num)) return num.toString();
                return (Math.round(num * 100) / 100).toString();
            }

            function calculateAll() {
                // Tab 1 (ਮੈਨੂਅਲ)
                const countSiropao = parseFloat(inputB.value) || 0;
                const countPinni = parseFloat(inputD.value) || 0;
                const receivedAmount = parseFloat(inputE.value) || 0;
                
                const cost151 = countSiropao * priceSiropao;
                const cost20 = countPinni * pricePinni;
                const totalCost = cost151 + cost20;
                const balance = totalCost - receivedAmount;
                
                sub_151.textContent = formatNumber(cost151);
                sub_20.textContent = formatNumber(cost20);
                
                result1.textContent = formatNumber(totalCost);
                result2.textContent = formatNumber(Math.abs(balance));
                
                // ਰੰਗ ਬਦਲਣ ਦਾ ਲੌਜਿਕ
                if (totalCost > receivedAmount) {
                    balance_value_container.className = "box-value text-red"; 
                } else if (totalCost < receivedAmount) {
                    balance_value_container.className = "box-value text-green"; 
                } else {
                    balance_value_container.className = "box-value text-white"; 
                }

                // Tab 2 (ਆਟੋ ਪਿੰਨੀ)
                const totalAmt2 = parseFloat(inputTab2Total.value) || 0;
                const count151_Tab2 = parseFloat(inputTab2_151.value) || 0;
                const cost151_Tab2 = count151_Tab2 * priceSiropao;
                const rem20 = totalAmt2 - cost151_Tab2;
                
                let count20_Tab2 = 0, cost20_Tab2 = 0, finalBal = totalAmt2;
                if (rem20 >= 0 && totalAmt2 > 0) {
                    count20_Tab2 = Math.floor(rem20 / pricePinni); 
                    cost20_Tab2 = count20_Tab2 * pricePinni;
                    finalBal = rem20 - cost20_Tab2;
                } else if (totalAmt2 > 0) {
                    finalBal = totalAmt2 - cost151_Tab2; 
                } else {
                    finalBal = 0;
                }
                
                // ਰੰਗ ਬਦਲਣ ਦਾ ਲੌਜਿਕ (Tab 2)
                if (finalBal < 0) {
                    tab2_balance_container.className = "box-value text-red";
                } else if (finalBal > 0) {
                    tab2_balance_container.className = "box-value text-green";
                } else {
                    tab2_balance_container.className = "box-value text-white";
                }
                
                tab2_balance.textContent = formatNumber(Math.abs(finalBal));
                tab2_auto20_display.textContent = `${formatNumber(count20_Tab2)} (₹${formatNumber(cost20_Tab2)})`;

                // Tab 3 (ਕਨਵਰਟਰ)
                if (currentFocusedInput === inputTab3_Packets) {
                    const pktsIn3 = parseFloat(inputTab3_Packets.value) || 0;
                    inputTab3_Amount.value = formatNumber(pktsIn3 * pricePinni);
                } else if (currentFocusedInput === inputTab3_Amount) {
                    const amt3 = parseFloat(inputTab3_Amount.value) || 0;
                    inputTab3_Packets.value = formatNumber(Math.floor(amt3 / pricePinni));
                }
            }

            function resetCalculator() {
                if (activeTab === 'tab1') {
                    inputB.value = '0'; inputD.value = '0'; inputE.value = '0'; 
                    currentFocusedInput = inputB;
                } else if (activeTab === 'tab2') {
                    inputTab2Total.value = '0'; inputTab2_151.value = '0';
                    currentFocusedInput = inputTab2Total;
                } else {
                    inputTab3_Amount.value = '0'; inputTab3_Packets.value = '0';
                    currentFocusedInput = inputTab3_Amount;
                }
                calculateAll(); 
                if(currentFocusedInput) currentFocusedInput.focus(); 
                isOverwriteHead = true; 
            }

            editableInputs.forEach(input => {
                input.addEventListener('focus', () => {
                    currentFocusedInput = input;
                    input.select(); 
                    isOverwriteHead = true; 
                    calculateAll(); 
                });
                input.addEventListener('contextmenu', (e) => e.preventDefault());
            });

            keypad.addEventListener('click', (e) => {
                if (!e.target.matches('button')) return; 
                const key = e.target.textContent;

                if (key === 'ਕਲੀਅਰ') {
                    resetCalculator(); return; 
                }

                if (!currentFocusedInput) {
                    if (activeTab === 'tab1') currentFocusedInput = inputB;
                    else if (activeTab === 'tab2') currentFocusedInput = inputTab2Total;
                    else currentFocusedInput = inputTab3_Amount;
                    currentFocusedInput.focus();
                }

                if (key === '⌫') {
                    if (isOverwriteHead) currentFocusedInput.value = '0';
                    else currentFocusedInput.value = currentFocusedInput.value.slice(0, -1);
                    if (currentFocusedInput.value === '') currentFocusedInput.value = '0';
                    isOverwriteHead = false;
                } else {
                    if (isOverwriteHead) {
                        currentFocusedInput.value = (key === '.') ? '0.' : key;
                        isOverwriteHead = false;
                    } else {
                        if (currentFocusedInput.value === '0' && key !== '.') currentFocusedInput.value = key;
                        else if (key === '.' && currentFocusedInput.value.includes('.')) return;
                        else currentFocusedInput.value += key;
                    }
                }
                calculateAll(); 
            });

            // ਸ਼ੁਰੂਆਤੀ ਸੈਟਿੰਗਾਂ
            inputB.value = '0'; inputD.value = '0'; inputE.value = '0'; 
            inputTab2Total.value = '0'; inputTab2_151.value = '0';
            inputTab3_Amount.value = '0'; inputTab3_Packets.value = '0';
            
            // ਪਹਿਲਾ ਫੋਕਸ ਸੈੱਟ ਕਰਨਾ
            currentFocusedInput = inputB;
            calculateAll(); 
        });
    </script>
</body>
</html>
