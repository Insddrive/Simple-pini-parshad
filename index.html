<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMOLED ਕੈਲਕੂਲੇਟਰ (ਆਫਲਾਈਨ)</title>
    <style>
        /* ਬੇਸ ਸਟਾਈਲ - ਆਫਲਾਈਨ ਲਈ ਸਿਸਟਮ ਫੌਂਟ ਸਟੈਕ */
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            background-color: #000000;
            color: #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 16px;
            box-sizing: border-box;
            touch-action: manipulation;
            user-select: none;
        }

        .container {
            width: 100%;
            max-width: 448px;
            margin: 0 auto;
        }

        h1 {
            font-size: 1.875rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 1.5rem;
        }

        /* ਕਾਰਡ ਸਟਾਈਲ */
        .card {
            background-color: #111827;
            border: 1px solid #1f2937;
            padding: 1rem;
            border-radius: 1rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            margin-bottom: 1rem;
        }

        .overflow-x {
            overflow-x: auto;
        }

        /* ਟੈਕਸਟ ਸਟਾਈਲ */
        .text-right { text-align: right; }
        .text-3xl { font-size: 1.875rem; }
        .font-bold { font-weight: 700; }
        .text-green { color: #10b981; }
        .text-red { color: #ef4444; }
        .text-gray-400 { color: #9ca3af; }
        .text-white { color: #ffffff; }

        .flex-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.25rem;
            white-space: nowrap;
        }

        /* ਇਨਪੁਟ ਬਾਕਸ */
        .calc-input {
            width: 4rem;
            padding: 0.25rem 0.5rem;
            text-align: center;
            font-weight: 700;
            color: #ffffff;
            background-color: #1f2937;
            border: 2px solid #374151;
            border-radius: 0.375rem;
            transition: all 0.2s;
            outline: none;
        }

        .calc-input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 1px #3b82f6;
        }

        .calc-input[readonly] {
            cursor: default;
        }

        /* ਨੰਬਰ ਪੈਡ */
        .grid-keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.75rem;
        }

        .keypad-btn {
            padding: 1rem 0;
            font-size: 1.875rem;
            font-weight: 700;
            color: #ffffff;
            background-color: #1f2937;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: all 0.15s;
        }

        .keypad-btn:hover { background-color: #374151; }
        .keypad-btn:active { transform: scale(0.95); background-color: #4b5563; }

        .keypad-btn-special {
            background-color: #374151;
        }

        .keypad-btn-special:hover { background-color: #4b5563; }
        .keypad-btn-special:active { transform: scale(0.95); background-color: #6b7280; }

        .col-span-3 { grid-column: span 3 / span 3; }
        .hidden { display: none; }
        
        #inputE { width: 6rem; }
    </style>
</head>
<body>

    <div class="container">
        <h1>ਕਸਟਮ ਕੈਲਕੂਲੇਟਰ</h1>

        <!-- ਪਹਿਲੀ ਕੈਲਕੂਲੇਸ਼ਨ -->
        <div class="card overflow-x">
            <div class="text-right text-3xl font-bold text-green" style="margin-bottom: 0.5rem;">
                = <span id="result1">351</span>
            </div>
            <div class="flex-row" style="font-size: 1.125rem;">
                <span class="text-gray-400">(</span>
                <span class="font-bold text-white">151</span>
                <span class="text-gray-400">x</span>
                <input type="text" inputmode="none" id="inputB" value="1" class="calc-input" readonly>
                <span class="text-gray-400">)</span>
                <span class="text-gray-400">+</span>
                <span class="text-gray-400">(</span>
                <span class="font-bold text-white">20</span>
                <span class="text-gray-400">x</span>
                <input type="text" inputmode="none" id="inputD" value="10" class="calc-input" readonly>
                <span class="text-gray-400">)</span>
            </div>
        </div>

        <!-- ਦੂਜੀ ਕੈਲਕੂਲੇਸ਼ਨ -->
        <div class="card">
            <div class="flex-row" style="font-size: 1.25rem; gap: 0.5rem;">
                <span id="part1_display" class="font-bold text-green">151</span>
                <span class="text-gray-400">+</span>
                <span id="part2_display" class="font-bold text-green">200</span>
                <span class="text-gray-400">-</span>
                <input type="text" inputmode="none" id="inputE" value="500" class="calc-input" readonly>
                
                <span id="final_result_wrapper" class="hidden">
                    <span class="text-gray-400">=</span>
                    <span id="result2" class="font-bold text-red">-149</span>
                </span>
            </div>
        </div>

        <!-- ਨੰਬਰ ਪੈਡ -->
        <div id="keypad" class="card grid-keypad">
            <button class="keypad-btn">7</button>
            <button class="keypad-btn">8</button>
            <button class="keypad-btn">9</button>
            
            <button class="keypad-btn">4</button>
            <button class="keypad-btn">5</button>
            <button class="keypad-btn">6</button>
            
            <button class="keypad-btn">1</button>
            <button class="keypad-btn">2</button>
            <button class="keypad-btn">3</button>
            
            <button class="keypad-btn">.</button>
            <button class="keypad-btn">0</button>
            <button id="backspace" class="keypad-btn keypad-btn-special">⌫</button>
            
            <button id="clear" class="keypad-btn keypad-btn-special col-span-3">C</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputB = document.getElementById('inputB');
            const inputD = document.getElementById('inputD');
            const inputE = document.getElementById('inputE');
            const editableInputs = [inputB, inputD, inputE];

            const result1 = document.getElementById('result1');
            const part1_display = document.getElementById('part1_display'); 
            const part2_display = document.getElementById('part2_display'); 
            const result2 = document.getElementById('result2');
            const final_result_wrapper = document.getElementById('final_result_wrapper'); 
            const keypad = document.getElementById('keypad');

            if (!inputB || !inputD || !inputE || !result1 || !part1_display || !part2_display || !result2 || !final_result_wrapper || !keypad) {
                return; 
            }

            let currentFocusedInput = null; 
            let isOverwriteHead = false;
            let hasEditedInputE = false; 

            const valA = 151;
            const valC = 20;

            function calculate() {
                const valB = parseFloat(inputB.value) || 0;
                const valD = parseFloat(inputD.value) || 0;
                const valE = parseFloat(inputE.value) || 0;

                const part1 = valA * valB;
                const part2 = valC * valD;
                const res1 = part1 + part2;
                const res2 = res1 - valE;

                result1.textContent = formatNumber(res1);
                part1_display.textContent = formatNumber(part1); 
                part2_display.textContent = formatNumber(part2); 
                result2.textContent = formatNumber(res2);

                if (hasEditedInputE) {
                    final_result_wrapper.classList.remove('hidden');
                } else {
                    final_result_wrapper.classList.add('hidden');
                }
            }
            
            function resetCalculator() {
                inputB.value = '0'; 
                inputD.value = '0'; 
                inputE.value = '0'; 
                hasEditedInputE = false; 
                calculate(); 
                if(currentFocusedInput) currentFocusedInput.blur(); 
                currentFocusedInput = null; 
                isOverwriteHead = false; 
            }

            function formatNumber(num) {
                if (Number.isInteger(num)) return num.toString();
                return (Math.round(num * 100) / 100).toString();
            }

            editableInputs.forEach(input => {
                input.addEventListener('focus', () => {
                    currentFocusedInput = input;
                    input.select(); 
                    isOverwriteHead = true; 
                });
                input.addEventListener('contextmenu', (e) => e.preventDefault());
            });

            keypad.addEventListener('click', (e) => {
                if (!e.target.matches('button')) return; 

                const key = e.target.textContent;

                if (key === 'C') {
                    resetCalculator();
                    return; 
                }

                if (!currentFocusedInput) {
                    currentFocusedInput = inputB;
                    currentFocusedInput.focus();
                }
                
                if (currentFocusedInput.id === 'inputE') {
                    hasEditedInputE = true;
                }

                if (key === '⌫') {
                    if (isOverwriteHead) {
                        currentFocusedInput.value = '0';
                    } else {
                        currentFocusedInput.value = currentFocusedInput.value.slice(0, -1);
                    }
                    if (currentFocusedInput.value === '') {
                        currentFocusedInput.value = '0';
                    }
                    isOverwriteHead = false;
                } else {
                    if (isOverwriteHead) {
                        currentFocusedInput.value = (key === '.') ? '0.' : key;
                        isOverwriteHead = false;
                    } else {
                        if (currentFocusedInput.value === '0' && key !== '.') {
                            currentFocusedInput.value = key;
                        } else if (key === '.' && currentFocusedInput.value.includes('.')) {
                            return;
                        } else {
                            currentFocusedInput.value += key;
                        }
                    }
                }
                calculate(); 
            });

            // ਸ਼ੁਰੂਆਤੀ ਸੈਟਿੰਗ
            inputB.value = '1';
            inputD.value = '10';
            inputE.value = '500';
            hasEditedInputE = true; 
            calculate(); 
        });
    </script>
</body>
</html>
